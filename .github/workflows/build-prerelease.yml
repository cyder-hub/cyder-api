name: Build Pre-release Image

on:
  release:
    # Triggers when a release is published as a 'pre-release'.
    types: [prereleased]

jobs:
  transform-quality-gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Cache cargo artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-transform-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-transform-

      - name: Run transform quality gate
        run: cargo run -p cyder-api --bin transform_quality_gate -- --quick --report-out /tmp/transform-quality-report.json

      - name: Upload transform quality report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: transform-quality-report
          path: /tmp/transform-quality-report.json
          if-no-files-found: ignore

  build:
    needs: transform-quality-gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. Required: Initialize Docker Buildx to enable GHA cache backend
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}
            ${{ secrets.DOCKERHUB_USERNAME }}/cyder-api
          tags: |
            type=semver,pattern={{version}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          # Using the Dockerfile optimized with cargo-chef
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # 2. Cache configuration:
          # This allows the release build to pull layers from the 'master' branch cache
          cache-from: type=gha
          # mode=max ensures intermediate cargo-chef layers are saved
          cache-to: type=gha,mode=max
