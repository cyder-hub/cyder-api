name: Build and Push Docker Image to GHCR

on:
  push:
    branches: [ "master" ]

jobs:
  transform-quality-gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CARGO_TERM_COLOR: always

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      run: |
        rustup toolchain install stable --profile minimal
        rustup default stable

    - name: Cache cargo artifacts
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-transform-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-transform-

    - name: Run transform quality gate
      run: cargo run -p cyder-api --bin transform_quality_gate -- --quick --report-out /tmp/transform-quality-report.json

    - name: Upload transform quality report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: transform-quality-report
        path: /tmp/transform-quality-report.json
        if-no-files-found: ignore

  build-and-push:
    needs: transform-quality-gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # Required: Initialize Docker Buildx to enable GHA cache export
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to the GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        # Instructs Docker to pull cached layers from the GHA backend
        cache-from: type=gha
        # Instructs Docker to export all internal layers to the GHA backend
        cache-to: type=gha,mode=max
        tags: |
          ghcr.io/${{ github.repository }}:${{ github.sha }}
