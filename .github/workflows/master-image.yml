name: Master Image

on:
  push:
    branches: ["master"]
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref or SHA to build. Non-current master refs never move edge.
        required: false
        type: string

permissions:
  actions: read
  contents: read
  packages: write

concurrency:
  group: master-image-${{ github.event_name == 'push' && github.ref || github.run_id }}
  # Preserve the commit-addressed image needed by a later release. A docs-only
  # follow-up push must not cancel an in-flight runtime image build.
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    outputs:
      run_build: ${{ steps.detect.outputs.run_build }}
      build_reason: ${{ steps.detect.outputs.build_reason }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}
          fetch-depth: 0

      - name: Detect image changes
        id: detect
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          run_build=false
          build_reason="No runtime image inputs changed."
          changed_files="$(mktemp)"
          : > "$changed_files"

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            run_build=true
            build_reason="Manual dispatch always builds the requested ref."
          else
            if [[ -z "$BASE_SHA" || "$BASE_SHA" =~ ^0+$ ]] || ! git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
              git diff-tree --no-commit-id --name-only -r "$HEAD_SHA" > "$changed_files"
            else
              git diff --name-only "$BASE_SHA" "$HEAD_SHA" > "$changed_files"
            fi

            while IFS= read -r file; do
              case "$file" in
                Dockerfile|.dockerignore|docker-entrypoint|Cargo.toml|Cargo.lock|server/*|front/*)
                  run_build=true
                  build_reason="Runtime image inputs changed."
                  break
                  ;;
              esac
            done < "$changed_files"
          fi

          {
            echo "run_build=$run_build"
            echo "build_reason=$build_reason"
          } >> "$GITHUB_OUTPUT"

          {
            echo "### Master Image Preparation"
            echo ""
            echo "- Runtime rebuild requested: ${run_build}"
            echo "- Reason: ${build_reason}"
            if [[ -s "$changed_files" ]]; then
              echo ""
              echo "Changed files:"
              sed 's/^/- /' "$changed_files"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  build-and-push:
    needs: prepare
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Resolve source metadata
        id: source
        shell: bash
        run: |
          set -euo pipefail

          source_sha="$(git rev-parse HEAD)"
          image="ghcr.io/${GITHUB_REPOSITORY,,}"

          {
            echo "source_sha=$source_sha"
            echo "image=$image"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve commit image plan
        id: image_plan
        shell: bash
        env:
          IMAGE: ${{ steps.source.outputs.image }}
          BASE_SHA: ${{ github.event.before || '' }}
          REBUILD_REQUESTED: ${{ needs.prepare.outputs.run_build }}
        run: |
          set -euo pipefail

          build_image=false
          reuse_image=false
          base_digest=""

          if [[ "$REBUILD_REQUESTED" == "true" ]]; then
            build_image=true
            plan_reason="Runtime image inputs changed or a manual rebuild was requested."
          elif [[ -n "$BASE_SHA" && ! "$BASE_SHA" =~ ^0+$ ]]; then
            if base_digest="$(
              docker buildx imagetools inspect \
                "${IMAGE}:${BASE_SHA}" \
                --format '{{.Manifest.Digest}}' 2>/dev/null
            )"; then
              reuse_image=true
              plan_reason="No runtime inputs changed; reuse the base commit image."
            else
              build_image=true
              plan_reason="No runtime inputs changed, but the base commit image is missing; rebuild as a safe fallback."
            fi
          else
            build_image=true
            plan_reason="No reusable base commit was available; rebuild as a safe fallback."
          fi

          {
            echo "build_image=$build_image"
            echo "reuse_image=$reuse_image"
            echo "base_digest=$base_digest"
            echo "plan_reason=$plan_reason"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push commit image
        id: build
        if: steps.image_plan.outputs.build_image == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.source.outputs.image }}:${{ steps.source.outputs.source_sha }}
          cache-from: type=gha,scope=master-image,version=2
          cache-to: type=gha,scope=master-image,mode=max,version=2

      - name: Reuse base commit image
        if: steps.image_plan.outputs.reuse_image == 'true'
        shell: bash
        env:
          IMAGE: ${{ steps.source.outputs.image }}
          SOURCE_SHA: ${{ steps.source.outputs.source_sha }}
          BASE_DIGEST: ${{ steps.image_plan.outputs.base_digest }}
        run: |
          set -euo pipefail

          docker buildx imagetools create \
            --tag "${IMAGE}:${SOURCE_SHA}" \
            "${IMAGE}@${BASE_DIGEST}"

      - name: Resolve published commit image
        id: commit_image
        shell: bash
        env:
          IMAGE: ${{ steps.source.outputs.image }}
          SOURCE_SHA: ${{ steps.source.outputs.source_sha }}
          REUSED_DIGEST: ${{ steps.image_plan.outputs.base_digest }}
        run: |
          set -euo pipefail

          digest="$(
            docker buildx imagetools inspect \
              "${IMAGE}:${SOURCE_SHA}" \
              --format '{{.Manifest.Digest}}'
          )"

          if [[ -n "$REUSED_DIGEST" && "$digest" != "$REUSED_DIGEST" ]]; then
            echo "Reused image digest ${digest} does not match base digest ${REUSED_DIGEST}." >&2
            exit 1
          fi

          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      - name: Resolve edge eligibility
        id: edge_eligibility
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_SHA: ${{ steps.source.outputs.source_sha }}
        run: |
          set -euo pipefail

          master_sha="$(
            gh api "repos/${GITHUB_REPOSITORY}/git/ref/heads/master" \
              --jq '.object.sha'
          )"

          if [[ "$SOURCE_SHA" == "$master_sha" ]]; then
            promote_edge=true
            reason="Source SHA is the current master HEAD."
          else
            promote_edge=false
            reason="Source SHA is not the current master HEAD; publish the SHA image without moving edge."
          fi

          {
            echo "promote_edge=$promote_edge"
            echo "master_sha=$master_sha"
            echo "reason=$reason"
          } >> "$GITHUB_OUTPUT"

      - name: Wait for successful CI
        if: steps.edge_eligibility.outputs.promote_edge == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_SHA: ${{ steps.source.outputs.source_sha }}
        run: |
          set -euo pipefail

          deadline=$((SECONDS + 1800))
          while true; do
            ci_run_tsv="$(
              gh api --method GET "repos/${GITHUB_REPOSITORY}/actions/workflows/ci.yml/runs" \
                -f branch=master \
                -f event=push \
                -f head_sha="$SOURCE_SHA" \
                --jq '.workflow_runs[0] | if . == null then "" else [.id, .status, (.conclusion // "")] | @tsv end'
            )"

            if [[ -n "$ci_run_tsv" ]]; then
              IFS=$'\t' read -r ci_run_id ci_status ci_conclusion <<< "$ci_run_tsv"
              if [[ "$ci_status" == "completed" && "$ci_conclusion" == "success" ]]; then
                echo "CI run ${ci_run_id} approved image promotion."
                break
              fi
              if [[ "$ci_status" == "completed" ]]; then
                echo "CI run ${ci_run_id} completed with conclusion ${ci_conclusion}; edge will not move." >&2
                exit 1
              fi
              echo "Waiting for CI run ${ci_run_id}; current status is ${ci_status}."
            else
              echo "Waiting for a successful CI run for ${SOURCE_SHA}."
            fi

            if (( SECONDS >= deadline )); then
              echo "Timed out waiting for successful CI for ${SOURCE_SHA}." >&2
              exit 1
            fi
            sleep 15
          done

      - name: Promote commit image to edge
        id: edge_promotion
        if: steps.edge_eligibility.outputs.promote_edge == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          IMAGE: ${{ steps.source.outputs.image }}
          SOURCE_SHA: ${{ steps.source.outputs.source_sha }}
          BUILD_DIGEST: ${{ steps.commit_image.outputs.digest }}
        run: |
          set -euo pipefail

          current_master_sha="$(
            gh api "repos/${GITHUB_REPOSITORY}/git/ref/heads/master" \
              --jq '.object.sha'
          )"
          if [[ "$SOURCE_SHA" != "$current_master_sha" ]]; then
            {
              echo "promoted=false"
              echo "reason=Master advanced to ${current_master_sha} before promotion; edge was left unchanged."
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          docker buildx imagetools create \
            --tag "${IMAGE}:edge" \
            "${IMAGE}@${BUILD_DIGEST}"

          source_digest="$(docker buildx imagetools inspect "${IMAGE}:${SOURCE_SHA}" --format '{{.Manifest.Digest}}')"
          edge_digest="$(docker buildx imagetools inspect "${IMAGE}:edge" --format '{{.Manifest.Digest}}')"
          if [[ "$source_digest" != "$edge_digest" ]]; then
            echo "Edge digest ${edge_digest} does not match source digest ${source_digest}." >&2
            exit 1
          fi

          {
            echo "promoted=true"
            echo "reason=Source SHA passed master push CI and remained the current master HEAD."
          } >> "$GITHUB_OUTPUT"

      - name: Write image summary
        shell: bash
        env:
          WORKFLOW_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EDGE_PROMOTED: ${{ steps.edge_promotion.outputs.promoted || 'false' }}
          EDGE_REASON: ${{ steps.edge_promotion.outputs.reason || steps.edge_eligibility.outputs.reason }}
          IMAGE_PLAN: ${{ steps.image_plan.outputs.plan_reason }}
        run: |
          {
            echo "### Master Image"
            echo ""
            echo "- Run: ${WORKFLOW_RUN_URL}"
            echo "- Source SHA: ${{ steps.source.outputs.source_sha }}"
            echo "- SHA tag: ${{ steps.source.outputs.image }}:${{ steps.source.outputs.source_sha }}"
            echo "- Image plan: ${IMAGE_PLAN}"
            echo "- Digest: ${{ steps.commit_image.outputs.digest }}"
            if [[ "$EDGE_PROMOTED" == "true" ]]; then
              echo "- Edge tag: ${{ steps.source.outputs.image }}:edge"
            else
              echo "- Edge tag: unchanged"
            fi
            echo "- Edge decision: ${EDGE_REASON}"
          } >> "$GITHUB_STEP_SUMMARY"
