name: Release Image

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to build, for example v0.6.0.
        required: true
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: release-image-${{ github.event.release.tag_name || inputs.release_tag }}
  cancel-in-progress: false

jobs:
  validate-release:
    if: github.event_name == 'workflow_dispatch' || github.event.release.prerelease == true
    runs-on: ubuntu-24.04
    outputs:
      release_tag: ${{ steps.validate.outputs.release_tag }}
      version: ${{ steps.validate.outputs.version }}
      major_minor: ${{ steps.validate.outputs.major_minor }}
      image_ghcr: ${{ steps.validate.outputs.image_ghcr }}
      source_sha: ${{ steps.validate.outputs.source_sha }}
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || inputs.release_tag }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.release_tag }}

      - name: Validate release metadata
        id: validate
        shell: bash
        run: |
          set -euo pipefail

          release_tag="$RELEASE_TAG"
          if [[ ! "$release_tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must match vMAJOR.MINOR.PATCH: $release_tag" >&2
            exit 1
          fi

          version="${release_tag#v}"
          cargo_version="$(sed -n 's/^version = "\(.*\)"/\1/p' server/Cargo.toml | head -n 1)"
          if [[ "$cargo_version" != "$version" ]]; then
            echo "server/Cargo.toml version ($cargo_version) must match release tag version ($version)." >&2
            exit 1
          fi

          if [[ -z "$DOCKERHUB_USERNAME" || -z "$DOCKERHUB_TOKEN" ]]; then
            echo "DOCKERHUB_USERNAME and DOCKERHUB_TOKEN secrets are required before building release images." >&2
            exit 1
          fi

          major_minor="$(echo "$version" | cut -d. -f1,2)"
          image_ghcr="ghcr.io/${GITHUB_REPOSITORY}"
          source_sha="$(git rev-parse HEAD)"

          {
            echo "release_tag=$release_tag"
            echo "version=$version"
            echo "major_minor=$major_minor"
            echo "image_ghcr=$image_ghcr"
            echo "source_sha=$source_sha"
          } >> "$GITHUB_OUTPUT"

      - name: Write validation summary
        shell: bash
        run: |
          {
            echo "### Release Validation"
            echo ""
            echo "- Release tag: ${{ steps.validate.outputs.release_tag }}"
            echo "- Version: ${{ steps.validate.outputs.version }}"
            echo "- Source SHA: ${{ steps.validate.outputs.source_sha }}"
            echo "- GHCR image: ${{ steps.validate.outputs.image_ghcr }}"
            echo "- Docker Hub image: ${DOCKERHUB_USERNAME}/cyder-api"
          } >> "$GITHUB_STEP_SUMMARY"

  transform-quality-gate:
    needs: validate-release
    if: github.event_name == 'workflow_dispatch' || github.event.release.prerelease == true
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate-release.outputs.release_tag }}

      - name: Run transform quality gate
        uses: ./.github/actions/transform-quality-gate

  build-and-push:
    needs:
      - validate-release
      - transform-quality-gate
    if: github.event_name == 'workflow_dispatch' || github.event.release.prerelease == true
    runs-on: ubuntu-24.04
    env:
      IMAGE_DOCKERHUB: ${{ secrets.DOCKERHUB_USERNAME }}/cyder-api
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate-release.outputs.release_tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push release image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ needs.validate-release.outputs.image_ghcr }}:${{ needs.validate-release.outputs.version }}
            ${{ env.IMAGE_DOCKERHUB }}:${{ needs.validate-release.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Write image summary
        shell: bash
        env:
          WORKFLOW_NAME: ${{ github.workflow }}
          WORKFLOW_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          {
            echo "### Release Image"
            echo ""
            echo "- Workflow: ${WORKFLOW_NAME}"
            echo "- Run: ${WORKFLOW_RUN_URL}"
            echo "- Release tag: ${{ needs.validate-release.outputs.release_tag }}"
            echo "- Version: ${{ needs.validate-release.outputs.version }}"
            echo "- Source SHA: ${{ needs.validate-release.outputs.source_sha }}"
            echo "- GHCR tag: ${{ needs.validate-release.outputs.image_ghcr }}:${{ needs.validate-release.outputs.version }}"
            echo "- Docker Hub tag: ${IMAGE_DOCKERHUB}:${{ needs.validate-release.outputs.version }}"
            echo "- Digest: ${{ steps.build.outputs.digest }}"
          } >> "$GITHUB_STEP_SUMMARY"
