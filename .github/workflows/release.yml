name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to build and publish, for example v0.7.0.
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ inputs.release_tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  validate-release:
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: read
    outputs:
      release_tag: ${{ steps.validate.outputs.release_tag }}
      version: ${{ steps.validate.outputs.version }}
      major_minor: ${{ steps.validate.outputs.major_minor }}
      image_ghcr: ${{ steps.validate.outputs.image_ghcr }}
      image_dockerhub: ${{ steps.validate.outputs.image_dockerhub }}
      source_sha: ${{ steps.validate.outputs.source_sha }}
      ci_run_id: ${{ steps.validate.outputs.ci_run_id }}
    env:
      RELEASE_TAG_INPUT: ${{ inputs.release_tag || '' }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE }}
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Checkout release ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_tag || github.ref_name }}
          fetch-depth: 0

      - name: Validate release metadata
        id: validate
        shell: bash
        run: |
          set -euo pipefail

          release_tag="${RELEASE_TAG_INPUT:-${GITHUB_REF_NAME}}"
          if [[ ! "$release_tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must match vMAJOR.MINOR.PATCH: $release_tag" >&2
            exit 1
          fi

          git fetch --force origin "refs/heads/master:refs/remotes/origin/master"
          git fetch --force origin "refs/tags/${release_tag}:refs/tags/${release_tag}"

          source_sha="$(git rev-list -n 1 "$release_tag")"
          git checkout --detach "$source_sha"

          if ! git merge-base --is-ancestor "$source_sha" origin/master; then
            echo "Release tag ${release_tag} must point to a commit reachable from master." >&2
            exit 1
          fi

          version="${release_tag#v}"
          cargo_version="$(sed -n 's/^version = "\(.*\)"/\1/p' server/Cargo.toml | head -n 1)"
          if [[ "$cargo_version" != "$version" ]]; then
            echo "server/Cargo.toml version ($cargo_version) must match release tag version ($version)." >&2
            exit 1
          fi

          if [[ -z "$DOCKERHUB_USERNAME" || -z "$DOCKERHUB_TOKEN" || -z "$DOCKERHUB_NAMESPACE" ]]; then
            echo "DOCKERHUB_USERNAME and DOCKERHUB_TOKEN secrets plus DOCKERHUB_NAMESPACE variable are required before publishing release images." >&2
            exit 1
          fi

          if gh release view "$release_tag" >/dev/null 2>&1; then
            is_draft="$(gh release view "$release_tag" --json isDraft --jq .isDraft)"
            if [[ "$is_draft" != "true" ]]; then
              echo "Release ${release_tag} already exists and is not a draft." >&2
              exit 1
            fi
          fi

          deadline=$((SECONDS + 1800))
          ci_run_id=""
          while true; do
            ci_run_tsv="$(
              gh api --method GET "repos/${GITHUB_REPOSITORY}/actions/workflows/ci.yml/runs" \
                -f branch=master \
                -f event=push \
                -f head_sha="$source_sha" \
                --jq '.workflow_runs[0] | if . == null then "" else [.id, .status, (.conclusion // "")] | @tsv end'
            )"

            if [[ -n "$ci_run_tsv" ]]; then
              IFS=$'\t' read -r ci_run_id ci_status ci_conclusion <<< "$ci_run_tsv"
              if [[ "$ci_status" == "completed" && "$ci_conclusion" == "success" ]]; then
                break
              fi

              if [[ "$ci_status" == "completed" ]]; then
                echo "CI run ${ci_run_id} for ${source_sha} completed with conclusion ${ci_conclusion}, not success." >&2
                exit 1
              fi

              echo "Waiting for CI run ${ci_run_id} to complete; current status is ${ci_status}."
            else
              echo "Waiting for CI push run to appear for master commit ${source_sha}."
            fi

            if (( SECONDS >= deadline )); then
              echo "Timed out waiting for successful CI push run for master commit ${source_sha}." >&2
              exit 1
            fi
            sleep 30
          done

          if [[ -z "$ci_run_id" ]]; then
            echo "No successful CI push run was found for master commit ${source_sha}." >&2
            echo "Wait for CI to pass on master, or rerun the release after CI is green." >&2
            exit 1
          fi

          major_minor="$(echo "$version" | cut -d. -f1,2)"
          repository_slug="${GITHUB_REPOSITORY,,}"
          image_ghcr="ghcr.io/${repository_slug}"
          image_dockerhub="${DOCKERHUB_NAMESPACE}/cyder-api"

          {
            echo "release_tag=$release_tag"
            echo "version=$version"
            echo "major_minor=$major_minor"
            echo "image_ghcr=$image_ghcr"
            echo "image_dockerhub=$image_dockerhub"
            echo "source_sha=$source_sha"
            echo "ci_run_id=$ci_run_id"
          } >> "$GITHUB_OUTPUT"

      - name: Write validation summary
        shell: bash
        run: |
          {
            echo "### Release Validation"
            echo ""
            echo "- Release tag: ${{ steps.validate.outputs.release_tag }}"
            echo "- Version: ${{ steps.validate.outputs.version }}"
            echo "- Source SHA: ${{ steps.validate.outputs.source_sha }}"
            echo "- CI run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ steps.validate.outputs.ci_run_id }}"
            echo "- GHCR image: ${{ steps.validate.outputs.image_ghcr }}"
            echo "- Docker Hub image: ${{ steps.validate.outputs.image_dockerhub }}"
          } >> "$GITHUB_STEP_SUMMARY"

  prepare-version-images:
    needs: validate-release
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    permissions:
      packages: write
    outputs:
      ghcr_digest_ref: ${{ steps.prepare.outputs.ghcr_digest_ref }}
      dockerhub_digest_ref: ${{ steps.prepare.outputs.dockerhub_digest_ref }}
    env:
      VERSION: ${{ needs.validate-release.outputs.version }}
      SOURCE_SHA: ${{ needs.validate-release.outputs.source_sha }}
      IMAGE_GHCR: ${{ needs.validate-release.outputs.image_ghcr }}
      IMAGE_DOCKERHUB: ${{ needs.validate-release.outputs.image_dockerhub }}
    steps:
      - name: Set up crane
        uses: imjasonh/setup-crane@v0.7
        with:
          version: v0.21.7

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Prepare and verify immutable version images
        id: prepare
        shell: bash
        run: |
          set -euo pipefail

          ghcr_exists=false
          dockerhub_exists=false

          if crane digest "${IMAGE_GHCR}:${VERSION}" >/dev/null 2>&1; then
            ghcr_exists=true
          fi

          if crane digest "${IMAGE_DOCKERHUB}:${VERSION}" >/dev/null 2>&1; then
            dockerhub_exists=true
          fi

          if [[ "$ghcr_exists" == "true" && "$dockerhub_exists" == "true" ]]; then
            prepare_reason="Both immutable version images already exist; reusing them."
          elif [[ "$ghcr_exists" == "false" && "$dockerhub_exists" == "false" ]]; then
            source_ref="${IMAGE_GHCR}:${SOURCE_SHA}"
            deadline=$((SECONDS + 1800))
            while ! source_digest="$(crane digest "$source_ref" 2>/dev/null)"; do
              if (( SECONDS >= deadline )); then
                echo "Timed out waiting for Master Image artifact ${source_ref}." >&2
                exit 1
              fi
              echo "Waiting for Master Image artifact ${source_ref}."
              sleep 15
            done

            source_digest_ref="${IMAGE_GHCR}@${source_digest}"
            crane copy "$source_digest_ref" "${IMAGE_GHCR}:${VERSION}"
            crane copy "$source_digest_ref" "${IMAGE_DOCKERHUB}:${VERSION}"
            prepare_reason="Promoted the CI-approved commit image to immutable version tags without rebuilding it."
          else
            echo "Immutable version image state is inconsistent." >&2
            echo "GHCR ${IMAGE_GHCR}:${VERSION} exists: ${ghcr_exists}" >&2
            echo "Docker Hub ${IMAGE_DOCKERHUB}:${VERSION} exists: ${dockerhub_exists}" >&2
            echo "Refusing to overwrite ${VERSION}; fix the missing registry artifact manually, then rerun." >&2
            exit 1
          fi

          ghcr_digest="$(crane digest "${IMAGE_GHCR}:${VERSION}")"
          dockerhub_digest="$(crane digest "${IMAGE_DOCKERHUB}:${VERSION}")"
          if [[ "$ghcr_digest" != "$dockerhub_digest" ]]; then
            echo "Registry digests differ for immutable version ${VERSION}." >&2
            echo "GHCR: ${ghcr_digest}" >&2
            echo "Docker Hub: ${dockerhub_digest}" >&2
            exit 1
          fi

          ghcr_digest_ref="${IMAGE_GHCR}@${ghcr_digest}"
          dockerhub_digest_ref="${IMAGE_DOCKERHUB}@${dockerhub_digest}"

          {
            echo "ghcr_digest_ref=$ghcr_digest_ref"
            echo "dockerhub_digest_ref=$dockerhub_digest_ref"
          } >> "$GITHUB_OUTPUT"

          {
            echo "### Immutable Version Images"
            echo ""
            echo "- GHCR ${IMAGE_GHCR}:${VERSION} exists: ${ghcr_exists}"
            echo "- Docker Hub ${IMAGE_DOCKERHUB}:${VERSION} exists: ${dockerhub_exists}"
            echo "- GHCR digest ref: ${ghcr_digest_ref}"
            echo "- Docker Hub digest ref: ${dockerhub_digest_ref}"
            echo "- Result: ${prepare_reason}"
          } >> "$GITHUB_STEP_SUMMARY"

  create-draft-release:
    needs:
      - validate-release
      - prepare-version-images
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ needs.validate-release.outputs.release_tag }}
      VERSION: ${{ needs.validate-release.outputs.version }}
      IMAGE_GHCR: ${{ needs.validate-release.outputs.image_ghcr }}
      IMAGE_DOCKERHUB: ${{ needs.validate-release.outputs.image_dockerhub }}
      SOURCE_SHA: ${{ needs.validate-release.outputs.source_sha }}
      CI_RUN_ID: ${{ needs.validate-release.outputs.ci_run_id }}
      GHCR_DIGEST_REF: ${{ needs.prepare-version-images.outputs.ghcr_digest_ref }}
      DOCKERHUB_DIGEST_REF: ${{ needs.prepare-version-images.outputs.dockerhub_digest_ref }}
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate-release.outputs.release_tag }}

      - name: Build release manifest
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist/release-assets
          cat > dist/release-assets/release-manifest.json <<EOF
          {
            "package": "cyder-api",
            "version": "${VERSION}",
            "tag": "${RELEASE_TAG}",
            "commit": "${SOURCE_SHA}",
            "ciRun": "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${CI_RUN_ID}",
            "workflowRun": "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}",
            "images": [
              {
                "registry": "ghcr",
                "tag": "${IMAGE_GHCR}:${VERSION}",
                "digestRef": "${GHCR_DIGEST_REF}"
              },
              {
                "registry": "dockerhub",
                "tag": "${IMAGE_DOCKERHUB}:${VERSION}",
                "digestRef": "${DOCKERHUB_DIGEST_REF}"
              }
            ]
          }
          EOF

          (
            cd dist/release-assets
            sha256sum release-manifest.json > SHA256SUMS
            sha256sum -c SHA256SUMS
          )

      - name: Create or update draft release
        shell: bash
        run: |
          set -euo pipefail

          notes_file="${RUNNER_TEMP}/release-notes.md"
          gh api "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -f tag_name="$RELEASE_TAG" \
            -f target_commitish="$SOURCE_SHA" \
            --jq .body > "$notes_file"

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            is_draft="$(gh release view "$RELEASE_TAG" --json isDraft --jq .isDraft)"
            if [[ "$is_draft" != "true" ]]; then
              echo "Release ${RELEASE_TAG} already exists and is not a draft." >&2
              exit 1
            fi
            gh release edit "$RELEASE_TAG" --title "$RELEASE_TAG" --notes-file "$notes_file"
          else
            gh release create "$RELEASE_TAG" --draft --verify-tag --target "$SOURCE_SHA" --title "$RELEASE_TAG" --notes-file "$notes_file"
          fi

          gh release upload "$RELEASE_TAG" dist/release-assets/* --clobber

      - name: Write draft summary
        shell: bash
        run: |
          {
            echo "### Draft Release"
            echo ""
            echo "- Draft release: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${RELEASE_TAG}"
            echo "- Manifest: release-manifest.json"
            echo "- Checksum: SHA256SUMS"
          } >> "$GITHUB_STEP_SUMMARY"

  publish-release:
    needs:
      - validate-release
      - create-draft-release
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    environment: release
    permissions:
      contents: write
      packages: write
    env:
      RELEASE_TAG: ${{ needs.validate-release.outputs.release_tag }}
      VERSION: ${{ needs.validate-release.outputs.version }}
      MAJOR_MINOR: ${{ needs.validate-release.outputs.major_minor }}
      IMAGE_GHCR: ${{ needs.validate-release.outputs.image_ghcr }}
      IMAGE_DOCKERHUB: ${{ needs.validate-release.outputs.image_dockerhub }}
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Set up crane
        uses: imjasonh/setup-crane@v0.7
        with:
          version: v0.21.7

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Promote and verify release image tags
        shell: bash
        run: |
          set -euo pipefail

          ghcr_digest="$(crane digest "${IMAGE_GHCR}:${VERSION}")"
          dockerhub_digest="$(crane digest "${IMAGE_DOCKERHUB}:${VERSION}")"

          crane tag "${IMAGE_GHCR}:${VERSION}" "$MAJOR_MINOR"
          crane tag "${IMAGE_GHCR}:${VERSION}" latest
          crane tag "${IMAGE_DOCKERHUB}:${VERSION}" "$MAJOR_MINOR"
          crane tag "${IMAGE_DOCKERHUB}:${VERSION}" latest

          verify_tag() {
            local image="$1"
            local tag="$2"
            local expected_digest="$3"
            local actual_digest
            actual_digest="$(crane digest "${image}:${tag}")"
            if [[ "$actual_digest" != "$expected_digest" ]]; then
              echo "${image}:${tag} digest ${actual_digest} does not match ${expected_digest}." >&2
              exit 1
            fi
          }

          verify_tag "$IMAGE_GHCR" "$MAJOR_MINOR" "$ghcr_digest"
          verify_tag "$IMAGE_GHCR" latest "$ghcr_digest"
          verify_tag "$IMAGE_DOCKERHUB" "$MAJOR_MINOR" "$dockerhub_digest"
          verify_tag "$IMAGE_DOCKERHUB" latest "$dockerhub_digest"

          {
            echo "### Release Promotion Verification"
            echo ""
            echo "- Verified GHCR major/minor: ${IMAGE_GHCR}:${MAJOR_MINOR}"
            echo "- Verified GHCR latest: ${IMAGE_GHCR}:latest"
            echo "- Verified Docker Hub major/minor: ${IMAGE_DOCKERHUB}:${MAJOR_MINOR}"
            echo "- Verified Docker Hub latest: ${IMAGE_DOCKERHUB}:latest"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Publish GitHub release
        shell: bash
        run: |
          set -euo pipefail

          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Unable to find draft release for ${RELEASE_TAG}." >&2
            exit 1
          fi

          is_draft="$(gh release view "$RELEASE_TAG" --json isDraft --jq .isDraft)"
          if [[ "$is_draft" != "true" ]]; then
            echo "Release ${RELEASE_TAG} is already published." >&2
            exit 1
          fi

          gh release edit "$RELEASE_TAG" --draft=false --latest

          latest_tag="$(gh api "repos/${GITHUB_REPOSITORY}/releases/latest" --jq .tag_name)"
          if [[ "$latest_tag" != "$RELEASE_TAG" ]]; then
            echo "Expected ${RELEASE_TAG} to be latest release, but GitHub reports ${latest_tag}." >&2
            exit 1
          fi

      - name: Write publish summary
        shell: bash
        run: |
          {
            echo "### Published Release"
            echo ""
            echo "- Release tag: ${RELEASE_TAG}"
            echo "- Version: ${VERSION}"
            echo "- Major/minor: ${MAJOR_MINOR}"
            echo "- GHCR source: ${IMAGE_GHCR}:${VERSION}"
            echo "- GHCR promoted tags: ${IMAGE_GHCR}:${MAJOR_MINOR}, ${IMAGE_GHCR}:latest"
            echo "- Docker Hub source: ${IMAGE_DOCKERHUB}:${VERSION}"
            echo "- Docker Hub promoted tags: ${IMAGE_DOCKERHUB}:${MAJOR_MINOR}, ${IMAGE_DOCKERHUB}:latest"
            echo "- GitHub release is published and marked latest."
          } >> "$GITHUB_STEP_SUMMARY"
