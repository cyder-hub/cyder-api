# Base configuration sample.
#
# Docker and packaged deployments use CYDER_DATA_DIR=/data/cyder by default.
# Runtime load priority is:
# program defaults < generated config.default.yaml < base config.yaml <
# allowlisted CYDER_* environment variables < managed config.override.yaml.
#
# config.default.yaml is generated on first startup to persist random secrets
# and path-aware defaults. It is runtime state, not a tracked sample to edit.
#
# The only environment variables that override final config fields are
# CYDER_HOST, CYDER_PORT, CYDER_BASE_PATH, CYDER_LOG_LEVEL, and CYDER_TIMEZONE.
# Use YAML for secrets, database, Redis/cache, storage, deployment, runtime
# state, proxy, and governance settings.
#
# config.override.yaml is managed by the System Config page and should only
# contain the hot-reload allowlist fields accepted by the backend. Do not copy
# override-only edits into this sample; use the base config for restart-required
# settings such as bind, secrets, database, Redis/cache, storage, deployment, and
# runtime state backend.
#
# Local development is zero-config through cargo xtask dev. Generated files live
# under .cyder/dev, which is git-ignored. To migrate an old local config, copy it
# to .cyder/dev/config/config.yaml or set CYDER_CONFIG_PATH explicitly.
host: 0.0.0.0
port: 8000
base_path: /ai
secret_key: your_secret_key
password_salt: jKnDj%pNoJerZGPA&AG7Rwuwo&8tC6QW
jwt_secret: uCK6g1EBERjj2U7FT8sGlMFFzL2M3ufW
# api_key_jwt_secret: another_secret_key
db_url: /data/cyder/db/cyder.sqlite
# db_url: postgres://user:pass@host:port/schema_name
# Supported database URL forms are SQLite paths and PostgreSQL URLs.
redis:
  url: "redis://127.0.0.1:6379/"
  pool_size: 10
  key_prefix: "cyder:"
proxy: http://10.0.0.2:1081
proxy_request:
  connect_timeout_seconds: 10
  # LLM 流式/长生成请求可能持续很久，因此默认建议留空关闭整体超时。
  # total_timeout_seconds: 1800
routing_resilience:
  same_candidate_max_retries: 1
  max_candidates_per_request: 2
  base_backoff_ms: 250
  max_backoff_ms: 1500
  respect_retry_after_up_to_seconds: 3
# cache:
#   backend: memory # memory or redis
#   ttl: 3600 # 1 hour
#   negative_ttl: 60 # 1 minute
#   redis:
#     key_prefix: "cache:"

storage:
  driver: local # local/s3
  local:
    root: /data/cyder/storage
  s3:
    endpoint: s3.amazonaws.com
    region: us-east-1
    bucket: your-bucket-name
    access_mode: proxy # proxy/redirect
    access_key: your_access_key
    secret_key: your_secret_key
    force_path_style: true 
    public_url: https://cdn.example.com
