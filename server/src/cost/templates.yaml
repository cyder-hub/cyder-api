# Template authoring notes:
# - For llm.* meters, unit_price_nanos values are authored as major-currency prices per 1M tokens.
#   Examples: 2 means CNY/USD 2 per 1M tokens, 1.3 means CNY/USD 1.3 per 1M tokens.
# - For flat_fee_nanos, values are authored as major-currency amounts per request.
# - The loader converts these authored values into the internal nanos representation at import time.
templates:
  - key: google.gemini-3.1-pro.text
    title: Google Gemini 3.1 Pro
    catalog_name: Google / Gemini 3.1 Pro
    description: Built-in text model template for Gemini 3.1 Pro request cost estimation.
    currency: USD
    source: https://ai.google.dev/gemini-api/docs/pricing
    tags: [text, google]
    components:
      - input_text:
          charge_kind: tiered_per_unit
          tier_config:
            basis: total_input_tokens
            tiers:
              - up_to: 200000
                unit_price_nanos: 2
              - unit_price_nanos: 4
      - output_text:
          charge_kind: tiered_per_unit
          tier_config:
            basis: total_input_tokens
            tiers:
              - up_to: 200000
                unit_price_nanos: 12
              - unit_price_nanos: 18
      - request:
          flat_fee_nanos: 0

  - key: google.gemini-3.1-flash-lite.text
    title: Google Gemini 3.1 Flash Lite
